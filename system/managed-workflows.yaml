# Fleet manifest for managed GitHub Actions installed in every managed knowledge repo.
#
# See spec 0052 (system/product-specs/wip/0052-managed-repo-action-distribution.md)
# and design 0052 (system/designs/wip/0052-managed-repo-action-distribution.md)
# for the schema and the consuming feature stages.
#
# Workflows are added by the consuming spec's PR (e.g. 0045 cold-start-provenance,
# 0047 record-template-migration), each entry carrying:
#   - id: kebab-slug stable across the fleet
#   - template_path: path under coder-system/template/.github/workflows/
#   - receiver_endpoint: coder-core API path the workflow POSTs back to
#   - consuming_spec: WIP id that introduced it
#   - introduced: YYYY-MM-DD the workflow first shipped

workflows:
  - id: check-run-ci-fixup
    template_path: template/.github/workflows/check-run-ci-fixup.yml
    receiver_endpoint: /v1/managed-workflows/callbacks/check-run-ci-fixup
    consuming_spec: "0053"
    introduced: 2026-04-28
