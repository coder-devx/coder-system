# Source of truth for the roles registry.
# REGISTRY.md is generated/maintained from this file.
#
# Every role uses the folder shape (ADR 0027):
#   <role-id>/role.md            — identity, scope, permissions
#   <role-id>/tasks/<mode>.md    — per-mode task contract (worker roles only)
#
# Worker roles populate `tasks:`; non-worker roles omit it.
# A non-worker role may also populate `offline_tasks:` — modes the
# role supports that are invoked by tooling *outside* the dispatcher
# (e.g. an eval runner). These do not turn the role into a worker;
# the dispatcher still doesn't route to them.
# A common preamble at `_common.md` is prepended to every worker prompt
# at runtime by the coder-core dispatcher (design 0057,
# `role-prompt-knowledge-layout`).

roles:
  # ── User-defined ────────────────────────────────────────────────
  - id: system-admin
    name: System Admin
    status: defined
    owner: ro
    dir: system-admin
    file: system-admin/role.md

  - id: software-architect
    name: Software Architect
    status: defined
    owner: ro
    dir: software-architect
    file: software-architect/role.md
    tasks:
      - design
      - audit
      - ship

  - id: team-manager
    name: Team Manager
    status: defined
    owner: ro
    dir: team-manager
    file: team-manager/role.md
    tasks:
      - decompose

  - id: product-manager
    name: Product Manager
    status: defined
    owner: ro
    dir: product-manager
    file: product-manager/role.md
    tasks:
      - draft
      - accept
      - ship
      - audit

  - id: developer
    name: Developer
    status: defined
    owner: ro
    dir: developer
    file: developer/role.md
    tasks:
      - implement

  - id: reviewer
    name: Reviewer
    status: defined
    owner: ro
    dir: reviewer
    file: reviewer/role.md
    tasks:
      - review

  - id: consultant
    name: Consultant
    status: defined
    owner: ro
    dir: consultant
    file: consultant/role.md
    # ``offline_tasks`` (vs ``tasks``) signals modes the role supports
    # but the dispatcher does NOT route to. They're invoked by tooling
    # outside the production pipeline — currently the coder-core
    # ``evals.consultant_replay`` runner. Keeping these out of
    # ``tasks:`` preserves the contract that a populated Modes column
    # in REGISTRY.md means the role is dispatched.
    offline_tasks:
      - evaluate

  - id: founder
    name: Founder
    status: defined
    owner: ro
    dir: founder
    file: founder/role.md
    tasks:
      - weekly_review
      - idea_scan

  - id: designer
    name: Designer
    status: defined
    owner: ro
    dir: designer
    file: designer/role.md
    tasks:
      - design_sprint

  - id: marketer
    name: Marketer
    status: defined
    owner: ro
    dir: marketer
    file: marketer/role.md
    tasks:
      - content_sprint

  - id: analyst
    name: Analyst
    status: defined
    owner: ro
    dir: analyst
    file: analyst/role.md
    tasks:
      - funnel_review

  - id: researcher
    name: Researcher
    status: defined
    owner: ro
    dir: researcher
    file: researcher/role.md
    tasks:
      - synthesis

  # ── Proposed (review and accept/reject) ─────────────────────────
  - id: qa-engineer
    name: QA Engineer
    status: proposed
    owner: ro
    dir: qa-engineer
    file: qa-engineer/role.md

  - id: sre
    name: Site Reliability Engineer
    status: proposed
    owner: ro
    dir: sre
    file: sre/role.md

  - id: security-officer
    name: Security Officer
    status: proposed
    owner: ro
    dir: security-officer
    file: security-officer/role.md

  - id: release-manager
    name: Release Manager
    status: proposed
    owner: ro
    dir: release-manager
    file: release-manager/role.md

  - id: data-engineer
    name: Data Engineer
    status: proposed
    owner: ro
    dir: data-engineer
    file: data-engineer/role.md

  - id: doc-writer
    name: Documentation Writer
