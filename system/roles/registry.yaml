# Source of truth for the roles registry.
# REGISTRY.md is generated from this file.
#
# Worker roles use the folder shape introduced by design 0057:
#   <role-id>/role.md            — identity, scope, permissions
#   <role-id>/tasks/<mode>.md    — per-mode task contract
# Non-worker roles stay flat as <role-id>.md.
# A common preamble at `_common.md` is prepended to every worker prompt
# at runtime by the coder-core dispatcher.

roles:
  # ── User-defined ────────────────────────────────────────────────
  - id: system-admin
    name: System Admin
    status: defined
    owner: ro
    file: system-admin.md

  - id: software-architect
    name: Software Architect
    status: defined
    owner: ro
    dir: software-architect
    file: software-architect/role.md
    tasks:
      - design
      - audit
      - ship

  - id: team-manager
    name: Team Manager
    status: defined
    owner: ro
    dir: team-manager
    file: team-manager/role.md
    tasks:
      - decompose

  - id: product-manager
    name: Product Manager
    status: defined
    owner: ro
    dir: product-manager
    file: product-manager/role.md
    tasks:
      - draft
      - accept
      - ship
      - audit

  - id: developer
    name: Developer
    status: defined
    owner: ro
    dir: developer
    file: developer/role.md
    tasks:
      - implement

  - id: reviewer
    name: Reviewer
    status: defined
    owner: ro
    dir: reviewer
    file: reviewer/role.md
    tasks:
      - review

  - id: consultant
    name: Consultant
    status: defined
    owner: ro
    file: consultant.md

  # ── Proposed (review and accept/reject) ─────────────────────────
  - id: qa-engineer
    name: QA Engineer
    status: proposed
    owner: ro
    file: qa-engineer.md

  - id: sre
    name: Site Reliability Engineer
    status: proposed
    owner: ro
    file: sre.md

  - id: security-officer
    name: Security Officer
    status: proposed
    owner: ro
    file: security-officer.md

  - id: release-manager
    name: Release Manager
    status: proposed
    owner: ro
    file: release-manager.md

  - id: data-engineer
    name: Data Engineer
    status: proposed
    owner: ro
    file: data-engineer.md

  - id: doc-writer
    name: Documentation Writer
    status: proposed
    owner: ro
    file: doc-writer.md
