# Source of truth for the services registry.
# REGISTRY.md is generated from this file.
#
# Schema: see _TEMPLATE.md frontmatter.
#
# Status policy:
#   planned  — designed but not yet running
#   active   — running in some environment
#   deprecated — kept for history, not running

services:
  - id: coder-core
    name: Coder Core
    status: active
    owner: ro
    tier: core
    repos: [coder-core]
    tech: [python, fastapi]
    runtime: cloud-run
    region: europe-west1
    url: https://coder-core-ql732k45va-ew.a.run.app
    depends_on:
      services: []
      integrations: [github, gcp, slack, notion, anthropic]
      data_stores: [postgres]
    file: coder-core.md
    notes: >
      v0.0.3 — full multi-tenant orchestrator. All 8 design-0004 specs
      shipped (51/51 ACs). Projects, knowledge API, developer worker,
      per-role service accounts, pipeline UI, impersonation, CLI with
      onboard/doctor commands. 181 tests. 2 projects live (coder,
      vibetrade). DB at migration 0008.

  - id: coder-admin
    name: Coder Admin Panel
    status: active
    owner: ro
    tier: core
    repos: [coder-admin]
    tech: [typescript, react, vite, tailwind]
    runtime: cloud-run
    region: europe-west1
    depends_on:
      services: [coder-core]
      integrations: [gcp]
      data_stores: []
    file: coder-admin.md
    notes: >
      React/Vite SPA deployed 2026-04-09. Project switcher, knowledge
      browser, pipeline view with task list/detail/logs, impersonation
      badges. Auth via per-project API key in localStorage.
